<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/favicon.png">
    <title>Categories</title>
</head>
<body>
    <div class="mainPageBG">
            <header>
                <form action=""></form>
                <button class="buttonHeader">Предпочтения</button>
                <button class="buttonHeader wikiBtn">Вики</button>
                <button class="buttonHeader">Обсуждения</button>
                <button class="buttonHeader">Поддержка</button>
                <div class="headerSearch">
                    <span class="headerSearchBar">
                        <input type="search" placeholder="Поиск">
                        <img src="images/Group 4.png" alt="search" class="searchIcon">
                    </span>
                </div>
            </header>
            <div>
                <div class="flex justify-center">
                    <div>
                        <button class="returnBtn">назад</button>
                    </div>
                    
                    <span class="profileImage">
                        <button id="profileTrigger">
                            <span class="profileImage"><img src="images/avatarPlaceholder.png" alt="avatar"></span>
                        </button>
                    </span>
                </div>
                <div class="categoryGrid">
                    <button class="categoryBtn characterPage">Персонажи</button>
                    <button class="categoryBtn">Арсенал</button>
                    <button class="categoryBtn">Происхождения</button>
                    <button class="categoryBtn">Сюжет и лор</button>
                    <button class="categoryBtn">Локации</button>
                    <button class="categoryBtn">Секреты</button>
                    <button class="categoryBtn">Игровые режимы</button>
                    <button class="categoryBtn">Механики</button>
                    <button class="categoryBtn">другое</button>
                </div>
            </div>
            <div class="profileOverlay" id="profileOverlayCont">
                <div class="profileContent">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div><img src="images/avatarPlaceholder.png" alt="avatar" class="profileAvatar">
                            <p style="margin: 5px;">Аватар</p>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 20px;">
                            <span class="profileUsername">Отображаемое имя</span>
                            <span class="profileUsername">Имя пользователя</span>
                        </div>
                    </div>
                </div>
            </div>
</body>
        <script src="index.js"></script>
</html>
